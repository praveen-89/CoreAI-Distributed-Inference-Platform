version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass coreai_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "coreai_secure_pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
      - COREAI_API_KEY=sk-coreai-development-key-2026
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=coreai_secure_pass
      - REDIS_DB=0
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    deploy:
      replicas: 1
    environment:
      - MODEL_NAME=gpt-2
      - DEVICE=cpu
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=coreai_secure_pass
      - REDIS_DB=0
    depends_on:
      redis:
        condition: service_healthy
    # Using a named volume for huggingface cache to avoid re-downloading model weights
    volumes:
      - hf_cache:/root/.cache/huggingface

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # Use extra_hosts so prometheus can resolve host.docker.internal to scrape gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  hf_cache:
