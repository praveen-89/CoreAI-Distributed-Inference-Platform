global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'coreai_gateway'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'gateway'

  - job_name: 'coreai_prometheus'
    static_configs:
      - targets: ['localhost:9090']
